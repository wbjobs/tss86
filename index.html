<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window OCR Capture</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h2>窗口选择</h2>
        <button id="btn-refresh" class="btn btn-secondary">刷新窗口列表</button>
        <div id="window-list" class="window-list"></div>
      </div>

      <div class="sidebar-section">
        <h2>控制面板</h2>
        <div class="controls">
          <button id="btn-start" class="btn btn-primary" disabled>开始捕获</button>
          <button id="btn-stop" class="btn btn-danger" disabled>停止捕获</button>
        </div>
        <div class="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">未启动</span>
        </div>
      </div>

      <div class="sidebar-section">
        <h2>输出文件</h2>
        <div class="md-path" id="md-path" title="点击复制路径"></div>
        <button id="btn-change-path" class="btn btn-secondary btn-sm">更改路径</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="preview-panel">
        <div class="panel-header">
          <h2>截图预览</h2>
          <span id="capture-fps" class="badge"></span>
        </div>
        <div class="preview-container" id="preview-container">
          <div class="placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <p>选择一个窗口并开始捕获</p>
          </div>
        </div>
      </div>

      <div class="text-panel">
        <div class="panel-header">
          <h2>OCR 识别结果</h2>
          <div class="panel-actions">
            <button id="btn-clear-text" class="btn btn-secondary btn-sm">清空</button>
            <button id="btn-copy-text" class="btn btn-secondary btn-sm">复制</button>
          </div>
        </div>
        <div class="text-container" id="text-container">
          <div class="placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>等待 OCR 识别结果...</p>
          </div>
        </div>
        <div class="ocr-stats" id="ocr-stats"></div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
